<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Spam Detector — Powered by Azure ML</title>
    <meta name="description"
        content="Intelligent spam detection powered by Azure Machine Learning. Analyze messages instantly.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-deep: #06080f;
            --bg-surface: rgba(255, 255, 255, 0.025);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);
            --text-bright: #f1f5f9;
            --text-dim: #94a3b8;
            --text-muted: #64748b;
            --accent-1: #818cf8;
            --accent-2: #c084fc;
            --accent-3: #f472b6;
            --green: #34d399;
            --green-dim: rgba(52, 211, 153, 0.08);
            --green-border: rgba(52, 211, 153, 0.25);
            --red: #f87171;
            --red-dim: rgba(248, 113, 113, 0.08);
            --red-border: rgba(248, 113, 113, 0.25);
            --amber: #fbbf24;
            --amber-dim: rgba(251, 191, 36, 0.08);
            --amber-border: rgba(251, 191, 36, 0.25);
            --radius: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-deep);
            color: var(--text-bright);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 24px;
        }

        /* ── Animated background ── */
        .bg-glow {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-glow .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.18;
            animation: drift 20s ease-in-out infinite alternate;
        }

        .bg-glow .orb:nth-child(1) {
            width: 600px;
            height: 600px;
            background: var(--accent-1);
            top: -15%;
            left: -10%;
            animation-duration: 22s;
        }

        .bg-glow .orb:nth-child(2) {
            width: 500px;
            height: 500px;
            background: var(--accent-3);
            bottom: -20%;
            right: -10%;
            animation-duration: 18s;
            animation-delay: -5s;
        }

        .bg-glow .orb:nth-child(3) {
            width: 350px;
            height: 350px;
            background: var(--accent-2);
            top: 40%;
            left: 50%;
            animation-duration: 25s;
            animation-delay: -10s;
        }

        @keyframes drift {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(40px, -30px) scale(1.1);
            }

            100% {
                transform: translate(-20px, 20px) scale(0.95);
            }
        }

        /* ── Main card ── */
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            background: var(--bg-surface);
            backdrop-filter: blur(40px) saturate(1.4);
            -webkit-backdrop-filter: blur(40px) saturate(1.4);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius);
            padding: 44px 36px 36px;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.03) inset,
                0 30px 80px -20px rgba(0, 0, 0, 0.6);
        }

        /* ── Header ── */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .shield-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(129, 140, 248, 0.3);
            animation: pulse-glow 3s ease-in-out infinite;
        }

        .shield-icon svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 8px 24px rgba(129, 140, 248, 0.3);
            }

            50% {
                box-shadow: 0 8px 32px rgba(192, 132, 252, 0.45);
            }
        }

        .header h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.85rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent-1) 0%, var(--accent-2) 50%, var(--accent-3) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.88rem;
            line-height: 1.5;
        }

        /* ── Form ── */
        .form-field {
            margin-bottom: 20px;
        }

        .form-field label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .textarea-wrap {
            position: relative;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-subtle);
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .textarea-wrap:focus-within {
            border-color: var(--accent-1);
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.12);
        }

        textarea {
            width: 100%;
            height: 130px;
            background: transparent;
            border: none;
            color: var(--text-bright);
            padding: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.92rem;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        .char-count {
            position: absolute;
            bottom: 10px;
            right: 14px;
            font-size: 0.7rem;
            color: var(--text-muted);
            pointer-events: none;
        }

        /* ── Button ── */
        .btn-analyze {
            width: 100%;
            padding: 15px 24px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 60%, #ec4899 100%);
            background-size: 200% 200%;
            animation: gradient-shift 4s ease infinite;
            border: none;
            border-radius: 14px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.15s, box-shadow 0.25s, filter 0.25s;
            position: relative;
            overflow: hidden;
        }

        @keyframes gradient-shift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .btn-analyze:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(99, 102, 241, 0.35);
            filter: brightness(1.08);
        }

        .btn-analyze:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-analyze:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-analyze svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            flex-shrink: 0;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255, 255, 255, 0.25);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Result ── */
        .result {
            margin-top: 28px;
            border-radius: 16px;
            overflow: hidden;
            display: none;
            animation: slide-up 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-inner {
            padding: 24px;
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }

        .result-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .result-icon svg {
            width: 24px;
            height: 24px;
        }

        .result-body {
            flex: 1;
            min-width: 0;
        }

        .result-label {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .result-desc {
            font-size: 0.85rem;
            line-height: 1.55;
            color: var(--text-dim);
        }

        .result-msg {
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-subtle);
            font-size: 0.82rem;
            color: var(--text-dim);
            line-height: 1.5;
            word-break: break-word;
        }

        .result-msg strong {
            color: var(--text-bright);
            font-weight: 600;
        }

        /* Result variants */
        .result.safe {
            background: var(--green-dim);
            border: 1px solid var(--green-border);
        }

        .result.safe .result-icon {
            background: rgba(52, 211, 153, 0.15);
        }

        .result.safe .result-icon svg {
            fill: var(--green);
        }

        .result.safe .result-label {
            color: var(--green);
        }

        .result.danger {
            background: var(--red-dim);
            border: 1px solid var(--red-border);
        }

        .result.danger .result-icon {
            background: rgba(248, 113, 113, 0.15);
        }

        .result.danger .result-icon svg {
            fill: var(--red);
        }

        .result.danger .result-label {
            color: var(--red);
        }

        .result.warn {
            background: var(--amber-dim);
            border: 1px solid var(--amber-border);
        }

        .result.warn .result-icon {
            background: rgba(251, 191, 36, 0.15);
        }

        .result.warn .result-icon svg {
            fill: var(--amber);
        }

        .result.warn .result-label {
            color: var(--amber);
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.72rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .footer .dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--text-muted);
            opacity: 0.4;
        }

        /* ── Responsive ── */
        @media (max-width: 560px) {
            .card {
                padding: 32px 20px 28px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .result-inner {
                flex-direction: column;
                gap: 12px;
            }
        }
    </style>
</head>

<body>

    <!-- Animated background orbs -->
    <div class="bg-glow">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <main class="card">
        <!-- Header -->
        <div class="header">
            <div class="shield-icon">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-1 15l-4-4 1.41-1.41L11 13.17l5.59-5.59L18 9l-7 7z" />
                </svg>
            </div>
            <h1>AI Spam Detector</h1>
            <p>Analyze any message for spam indicators using Azure ML intelligence</p>
        </div>

        <!-- Input -->
        <div class="form-field">
            <label for="messageInput">Message to analyze</label>
            <div class="textarea-wrap">
                <textarea id="messageInput" placeholder="Paste or type a suspicious message here…"
                    oninput="updateCharCount()"></textarea>
                <span class="char-count" id="charCount">0 chars</span>
            </div>
        </div>

        <!-- Submit -->
        <button class="btn-analyze" id="submitBtn" onclick="analyzeText()">
            <div class="spinner" id="spinner"></div>
            <svg id="btnIcon" viewBox="0 0 24 24">
                <path
                    d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z" />
            </svg>
            <span id="btnText">Analyze Message</span>
        </button>

        <!-- Result -->
        <div class="result" id="resultCard">
            <div class="result-inner">
                <div class="result-icon" id="resultIcon">
                    <!-- icon injected by JS -->
                </div>
                <div class="result-body">
                    <div class="result-label" id="resultLabel"></div>
                    <div class="result-desc" id="resultDesc"></div>
                    <div class="result-msg" id="resultMsg"></div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <span>FastAPI</span>
            <span class="dot"></span>
            <span>Azure ML</span>
            <span class="dot"></span>
            <span>Multinomial NB</span>
        </div>
    </main>

    <script>
        function updateCharCount() {
            const len = document.getElementById('messageInput').value.length;
            document.getElementById('charCount').textContent = len + ' char' + (len !== 1 ? 's' : '');
        }

        const icons = {
            safe: '<svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-1 15l-4-4 1.41-1.41L11 13.17l5.59-5.59L18 9l-7 7z"/></svg>',
            danger: '<svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h2v2h-2v-2zm0-6h2v4h-2v-4z"/></svg>',
            warn: '<svg viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>'
        };

        async function analyzeText() {
            const input = document.getElementById('messageInput');
            const btn = document.getElementById('submitBtn');
            const spinner = document.getElementById('spinner');
            const btnIcon = document.getElementById('btnIcon');
            const btnText = document.getElementById('btnText');
            const card = document.getElementById('resultCard');

            const text = input.value.trim();
            if (!text) {
                input.focus();
                input.parentElement.style.borderColor = 'var(--red)';
                setTimeout(() => input.parentElement.style.borderColor = '', 1500);
                return;
            }

            // Loading state
            btn.disabled = true;
            spinner.style.display = 'inline-block';
            btnIcon.style.display = 'none';
            btnText.textContent = 'Analyzing…';
            card.style.display = 'none';

            try {
                const res = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Prediction failed.');

                const prediction = data.prediction.toLowerCase();
                showResult(prediction === 'spam' ? 'danger' : 'safe', text, prediction);

            } catch (err) {
                showResult('warn', '', '', err.message);
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
                btnIcon.style.display = '';
                btnText.textContent = 'Analyze Message';
            }
        }

        function showResult(type, message, prediction, errorMsg) {
            const card = document.getElementById('resultCard');
            const icon = document.getElementById('resultIcon');
            const label = document.getElementById('resultLabel');
            const desc = document.getElementById('resultDesc');
            const msg = document.getElementById('resultMsg');

            card.className = 'result ' + type;
            icon.innerHTML = icons[type];

            if (type === 'safe') {
                label.textContent = '✓ Not Spam';
                desc.textContent = 'No spam or phishing indicators detected. This message appears safe for interaction.';
                msg.innerHTML = '<strong>Analyzed:</strong> "' + escapeHtml(truncate(message, 120)) + '"';
            } else if (type === 'danger') {
                label.textContent = '⚠ Spam Detected';
                desc.textContent = 'This message matches known patterns of spam, fraud, or unsolicited marketing content. Exercise caution.';
                msg.innerHTML = '<strong>Flagged:</strong> "' + escapeHtml(truncate(message, 120)) + '"';
            } else {
                label.textContent = 'Analysis Failed';
                desc.textContent = errorMsg || 'An unexpected error occurred.';
                msg.innerHTML = '<strong>Tip:</strong> Check your connection and try again. If the issue persists, the Azure ML endpoint may be offline.';
            }

            // Re-trigger animation
            card.style.display = 'none';
            void card.offsetWidth;
            card.style.display = 'block';
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        function truncate(str, max) {
            return str.length > max ? str.substring(0, max) + '…' : str;
        }
    </script>
</body>

</html>
